name: CICD

env:
  CARGO_TERM_COLOR: always
  CICD_INTERMEDIATES_DIR: "_cicd-intermediates"
  MSRV_FEATURES: --no-default-features --features minimal-application,bugreport,build-assets

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

# Taken from bat workflow to learn how this works. Modify to fit our needs.
jobs:
  all-jobs:
    if: always()
    name: all-jobs
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - audit
      - build
    steps:
      - run: |
          jq -C <<< '${{ toJson(needs) }}'
          jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
  metadata:
    name: Extract crate metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract crate information
        id: metadata
        run: |
          cargo metadata --no-deps --format-version 1 | jq -r '"name=" + .packages[0].name' | tee -a $GITHUB_OUTPUT
          cargo metadata --no-deps --format-version 1 | jq -r '"version=" + .packages[0].version' | tee -a $GITHUB_OUTPUT
          cargo metadata --no-deps --format-version 1 | jq -r '"maintainer=" + .packages[0].authors[0]' | tee -a $GITHUB_OUTPUT
          cargo metadata --no-deps --format-version 1 | jq -r '"homepage=" + .packages[0].homepage' | tee -a $GITHUB_OUTPUT
          cargo metadata --no-deps --format-version 1 | jq -r '"msrv=" + .packages[0].rust_version' | tee -a $GITHUB_OUTPUT
          cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[].targets[] | select(.kind[] == "bin") | "bin=\(.name)"' \
          | tee -a $GITHUB_OUTPUT
      - name: Check for release
        id: is-release
        shell: bash
        run: |
          IS_RELEASE='false'; if [[ $GITHUB_REF =~ ^refs/tags/v[0-9].* ]]; then IS_RELEASE='true'; fi
          echo "is_release=${IS_RELEASE}" | tee -a $GITHUB_OUTPUT
    outputs:
      name: ${{ steps.metadata.outputs.name }}
      version: ${{ steps.metadata.outputs.version }}
      maintainer: ${{ steps.metadata.outputs.maintainer }}
      homepage: ${{ steps.metadata.outputs.homepage }}
      msrv: ${{ steps.metadata.outputs.msrv }}
      bin: ${{ steps.metadata.outputs.bin }}
      is_release: ${{ steps.is-release.outputs.is_release }}
  # Linting heavily taken from Cargo
  lint:
    needs:
      - rustfmt
      - clippy
      - lockfile
      - spellcheck
      - msrv
      #- stale-label
    name: Lint for code quality and style
    runs-on: ubuntu-latest
    steps:
      - name: Linting results
        run: |
          jq -C <<< '${{ toJson(needs) }}'
          jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'
  rustfmt:
    name: Lint for code quality and style
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Update Rust
        run: rustup update stable && rustup default stable
      - name: Add rustfmt
        run: rustup component add rustfmt
      - name: Run formatter
        run: cargo fmt --all --check
  clippy:
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: macOS aarch64
            os: macos-14
          - name: Windows x86_64 MSVC
            os: windows-latest
    name: Clippy ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Update Rust
        run: rustup update stable && rustup default stable
      - name: Add rustfmt
        run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets --no-deps -- -D warning
  lockfile:
    name: Check Cargo Lock
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Update Rust
        run: rustup update stable && rustup default stable
      - name: Check Cargo.lock
        run: cargo update -p pim --locked
  spellcheck:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Spell Check Repo
        uses: crate-ci/typos@v1.42.0
  msrv:
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Install Cargo Hack
        uses: taiki-e/install-action@cargo-hack
      - name: Check MSRV
        run: cargo hack check --all-targets --rust-version --workspace --ignore-private
          --locked
  #stale-label:
  #  runs-on: ubuntu-latest
  #  steps:
  #    - uses: actions/checkout@v6
  #    - run: rustup update stable && rustup default stable
  #    - run: cargo stale-label
  #lint-docs:
  #  runs-on: ubuntu-latest
  #  steps:
  #    - uses: actions/checkout@v5
  #    - run: rustup update stable && rustup default stable
  #    - run: cargo lint-docs --check
  # Ensure Cargo.lock is up-to-date

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Run Unit Tests
        run: cargo test --locked --release
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        # Prevent sudden announcement of a new advisory from failing ci:
        continue-on-error: ${{ matrix.checks == 'advisories' }}
        with:
          command: check ${{ matrix.checks }}
          rust-version: stable

  #          git push --follow-tags
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    # Do not run build unless all other checks have completed.
    needs:
      - metadata
      - lint
      - test
      - audit
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-unknown-linux-gnu,
              os: ubuntu-latest,
              dpkg_arch: amd64,
              use-cross: true,
            }
          - {
              target: i686-unknown-linux-gnu,
              os: ubuntu-latest,
              dpkg_arch: i686,
              use-cross: true,
            }
          - { target: i686-pc-windows-msvc, os: windows-latest }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              dpkg_arch: arm64,
              use-cross: true,
            }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    env:
      BUILD_CMD: cargo
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Install prerequisites
        shell: bash
        run: |
          case ${{ matrix.job.target }} in
            arm-unknown-linux-*) sudo apt-get -y update ; sudo apt-get -y install gcc-arm-linux-gnueabihf ;;
            aarch64-unknown-linux-gnu) sudo apt-get -y update ; sudo apt-get -y install gcc-aarch64-linux-gnu ;;
          esac
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}
      - name: Install cross
        if: matrix.job.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Overwrite build command env variable
        if: matrix.job.use-cross
        shell: bash
        run: echo "BUILD_CMD=cross" >> $GITHUB_ENV
      - name: Show version information (Rust, cargo, GCC)
        shell: bash
        run: |
          gcc --version || true
          rustup -V
          rustup toolchain list
          rustup default
          cargo -V
          rustc -V
      - name: Build
        shell: bash
        run: $BUILD_CMD build --locked --release --target=${{ matrix.job.target }}
      - name: Set binary name & path
        id: bin
        shell: bash
        run: |
          # Figure out suffix of binary
          EXE_suffix=""
          case ${{ matrix.job.target }} in
            *-pc-windows-*) EXE_suffix=".exe" ;;
          esac;

          # Setup paths
          BIN_NAME="${{ needs.metadata.outputs.bin }}${EXE_suffix}"
          BIN_PATH="target/${{ matrix.job.target }}/release/${BIN_NAME}"

          # Let subsequent steps know where to find the binary
          echo "BIN_PATH=${BIN_PATH}" >> $GITHUB_OUTPUT
          echo "BIN_NAME=${BIN_NAME}" >> $GITHUB_OUTPUT
      - name: Set testing options
        id: test-options
        shell: bash
        run: |
          # test only library unit tests and binary for arm-type targets
          unset CARGO_TEST_OPTIONS
          unset CARGO_TEST_OPTIONS ; case ${{ matrix.job.target }} in arm-* | aarch64-*) CARGO_TEST_OPTIONS="--lib --bin ${{ needs.metadata.outputs.name }}" ;; esac;
          echo "CARGO_TEST_OPTIONS=${CARGO_TEST_OPTIONS}" >> $GITHUB_OUTPUT
      # We need to add testing before enabling this section
      #- name: Run tests
      #  shell: bash
      #  run: |
      #    if [[ ${{ matrix.job.os }} = windows-* ]]
      #    then
      #      powershell.exe -command "$BUILD_CMD test --locked --target=${{ matrix.job.target }} ${{ steps.test-options.outputs.CARGO_TEST_OPTIONS}}"
      #    else
      #      $BUILD_CMD test --locked --target=${{ matrix.job.target }} ${{ steps.test-options.outputs.CARGO_TEST_OPTIONS}}
      #    fi

      # Test file conversion
      - name: Run pim
        shell: bash
        run: $BUILD_CMD run --locked --target=${{ matrix.job.target }} -- -s
          testdata/test.yml -t testdata/targets/
      # Run binary test against 8.8.8.8. Return code indicates success.
      - name: Verify files were created
        shell: bash
        run: |
          fileCount=$(find testdata/targets/ -maxdepth 1 -type f | wc -l)
          if [ "$fileCount" -eq 3 ]; then
            echo "ok"
          else
            echo "fail"
            exit 1
          fi

      # Creates a tarball or zip file containing the built binary and other assets for each build type.
      - name: Create tarball
        id: package
        shell: bash
        run: |
          PKG_suffix=".tar.gz" ; case ${{ matrix.job.target }} in *-pc-windows-*) PKG_suffix=".zip" ;; esac;
          PKG_BASENAME=${{ needs.metadata.outputs.bin}}-v${{ needs.metadata.outputs.version }}-${{ matrix.job.target }}
          PKG_NAME=${PKG_BASENAME}${PKG_suffix}
          echo "PKG_NAME=${PKG_NAME}" >> $GITHUB_OUTPUT

          PKG_STAGING="${{ env.CICD_INTERMEDIATES_DIR }}/package"
          ARCHIVE_DIR="${PKG_STAGING}/${PKG_BASENAME}/"
          mkdir -p "${ARCHIVE_DIR}"
          mkdir -p "${ARCHIVE_DIR}/autocomplete"

          # Binary
          cp "${{ steps.bin.outputs.BIN_PATH }}" "$ARCHIVE_DIR"

          # README, LICENSE and CHANGELOG files
          cp "README.md" "LICENSE-MIT" "LICENSE-APACHE" "CHANGELOG.md" "$ARCHIVE_DIR"

          # base compressed package
          pushd "${PKG_STAGING}/" >/dev/null
          case ${{ matrix.job.target }} in
            *-pc-windows-*) 7z -y a "${PKG_NAME}" "${PKG_BASENAME}"/* | tail -2 ;;
            *) tar czf "${PKG_NAME}" "${PKG_BASENAME}"/* ;;
          esac;
          popd >/dev/null

          # Let subsequent steps know where to find the compressed package
          echo "PKG_PATH=${PKG_STAGING}/${PKG_NAME}" >> $GITHUB_OUTPUT

      - name: "Artifact upload: tarball"
        uses: actions/upload-artifact@master
        with:
          name: ${{ steps.package.outputs.PKG_NAME }}
          path: ${{ steps.package.outputs.PKG_PATH }}

      - name: Publish archives and packages
        uses: softprops/action-gh-release@v2
        if: needs.metadata.outputs.is_release == 'true'
        with:
          files: |
            ${{ steps.package.outputs.PKG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
